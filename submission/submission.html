<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Pop-Up Banner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        html, body {
            background: transparent;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        :root {
            --banner-h: 60px;
        }

        #overlay-container {
            width: 960px;
            height: 540px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        #banner {
            position: absolute;
            top: calc(-1 * var(--banner-h));
            width: 100%;
            height: var(--banner-h);
            
            justify-content: space-between;
            
            background: rgba(255, 255, 255, 0.95);
            color: black;
            
            display: flex;
            align-items: center;
            
            padding: 0 6px;
            box-sizing: border-box;
            
            font-size: 12px;
            z-index: 20;
            
            transition: top 0.15s ease;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
        }

        #banner.active {
            top: 0;
        }

        #banner button {
            font-size: 11px;
            padding: 2px 4px;
            cursor: pointer;
        }

        #close-x {
            position: absolute;
            right: 4px;
            top: 4px;
            width: 4px;
            height: 4px;
            background: transparent;
            color: white;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            z-index: 30;
            margin-right: 5px;
            margin-top: 3px;
            transition: transform 0.15s ease;
        }

        #overlay-container.shifted #close-x {
            transform: translateY(var(--banner-h));
        }
    </style>
</head>

<body>
    <div id="overlay-container">

        <div id="banner">

            <div class="banner-left">
                System Notification:  
            </div>

            <div class="banner-right">
                <button id="visit-btn">Visit Website</button>
            </div>

        </div>

        <div id="close-x">✕</div>

    </div>

    <script>
        
        (function(window, document){

        function adSuccess() {
            window.top.postMessage({ type: 'success' }, '*');
        }

        const container = document.getElementById('overlay-container');
        const closeX = document.getElementById('close-x');
        const banner = document.getElementById('banner');

        let shiftedDown = false;

        container.addEventListener('click', () => {
            window.open('https://www.google.com', '_blank');
        });

        container.addEventListener('mousemove', (e) => {
            const rect = closeX.getBoundingClientRect();

            const y = e.clientY;

            if (y < 60 && !shiftedDown) {
                shiftedDown = true;
                banner.classList.add("active");
                container.classList.add("shifted");
            }

            if (shiftedDown && y > 60) {
                shiftedDown = false;
                banner.classList.remove("active");
                container.classList.remove("shifted");
            }
        });

        closeX.addEventListener('click', (e) => {
            e.stopPropagation();
            adSuccess();
        });

        })(window, document);
    </script>

</body>
</html>
